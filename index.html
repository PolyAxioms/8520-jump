<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8520.cc | PolyAxiom 預測市場導航</title>
    <style>
        /* 基礎樣式：深色科技感 */
        body { 
            background-color: #0d1117; 
            color: #e6edf3; 
            margin: 0; 
            padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
        }

        /* 新增：Logo 區域樣式 */
        .logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0 10px;
            gap: 20px; /* Logo 之間的間距 */
        }
        .logo-item {
            height: 40px; /* 統一 Logo 高度，確保整齊 */
            display: flex;
            align-items: center;
        }
        .logo-item img {
            height: 100%; /* 圖片高度撐滿容器 */
            width: auto;  /* 寬度自動縮放 */
        }
        .logo-separator {
            color: #30363d;
            font-size: 24px;
            font-weight: 300;
        }

        .header { text-align: center; padding: 10px 0 20px; }
        .header h1 { font-size: 32px; color: #58a6ff; margin: 0; font-weight: 800; letter-spacing: 1px; }
        
        /* 中英雙語邀請橫條 */
        .notice-bar {
            max-width: 900px;
            margin: 0 auto 35px;
            padding: 15px 25px;
            background: rgba(88, 166, 255, 0.08);
            border: 1px dashed #58a6ff;
            border-radius: 12px;
            text-align: center;
            line-height: 1.8;
        }
        .notice-bar .zh { font-size: 16px; font-weight: 500; display: block; margin-bottom: 4px; }
        .notice-bar .en { font-size: 13px; color: #8b949e; display: block; letter-spacing: 0.5px; }
        .notice-bar a { color: #58a6ff; text-decoration: none; font-weight: 700; transition: 0.3s; border-bottom: 1px solid transparent; }
        .notice-bar a:hover { border-bottom: 1px solid #58a6ff; }

        /* 自動適應網格佈局 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); 
            gap: 24px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }
        
        /* 卡片樣式 */
        .card { 
            border: 1px solid #30363d; 
            border-radius: 16px; 
            background: #161b22; 
            height: 320px; 
            overflow: hidden; 
            position: relative; 
            transition: 0.3s ease; 
        }
        .card:hover { 
            transform: translateY(-5px); 
            border-color: #58a6ff; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
        }
        
        /* 透明跳轉層 */
        .click-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            cursor: pointer; 
        }
        iframe { pointer-events: none; }

        /* 底部樣式 */
        .footer { 
            text-align: center; 
            padding: 60px 0 20px; 
            color: #484f58; 
            font-size: 13px; 
        }
        .footer a { 
            color: #484f58; 
            text-decoration: none; 
            border-bottom: 1px dashed #30363d; 
            transition: 0.3s; 
        }
        .footer a:hover { 
            color: #58a6ff; 
            border-bottom-color: #58a6ff; 
        }
    </style>
</head>
